<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oma's Geburtstagsquiz – 91 Jahre!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #FFF8F0;
  --gold: #D4A853;
  --gold-light: #F0DBA8;
  --rose: #C4727F;
  --rose-light: #F2D1D5;
  --deep: #3B2314;
  --warm-gray: #7A6B63;
  --sage: #8BA888;
}

body {
  font-family: 'Lora', Georgia, serif;
  background: var(--cream);
  color: var(--deep);
  min-height: 100vh;
  overflow-x: hidden;
}

.confetti-container {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1000;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 10px; height: 10px;
  top: -20px;
  animation: confetti-fall linear forwards;
  opacity: 0;
}

@keyframes confetti-fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.screen {
  display: none;
  min-height: 100vh;
  padding: 2rem 1rem;
  animation: fadeIn 0.6s ease;
}

.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* START SCREEN */
.start-screen {
  background: linear-gradient(135deg, var(--cream) 0%, var(--rose-light) 50%, var(--gold-light) 100%);
  text-align: center;
}

.start-screen h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 900;
  color: var(--deep);
  line-height: 1.1;
  margin-bottom: 0.5rem;
}

.start-screen .age {
  font-family: 'Playfair Display', serif;
  font-size: clamp(5rem, 12vw, 9rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--rose));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin: 0.5rem 0;
}

.start-screen .subtitle {
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  color: var(--warm-gray);
  margin-bottom: 2rem;
  font-style: italic;
}

.btn {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  padding: 1rem 3rem;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.btn-start {
  background: linear-gradient(135deg, var(--gold), var(--rose));
  color: white;
  box-shadow: 0 8px 30px rgba(212, 168, 83, 0.4);
}

.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(212, 168, 83, 0.5);
}

/* QUIZ SCREEN */
.quiz-screen {
  background: var(--cream);
  padding-top: 1rem;
}

.progress-bar {
  width: 90%;
  max-width: 600px;
  height: 8px;
  background: var(--rose-light);
  border-radius: 4px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--rose));
  border-radius: 4px;
  transition: width 0.5s ease;
}

.question-counter {
  font-family: 'Playfair Display', serif;
  font-size: 0.9rem;
  color: var(--warm-gray);
  margin-bottom: 1rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.quiz-card {
  background: white;
  border-radius: 24px;
  box-shadow: 0 10px 60px rgba(59, 35, 20, 0.08);
  max-width: 600px;
  width: 92%;
  overflow: hidden;
  animation: cardIn 0.5s ease;
}

@keyframes cardIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.quiz-image-container {
  width: 100%;
  aspect-ratio: 4/3;
  overflow: hidden;
  position: relative;
}

.quiz-image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.quiz-content {
  padding: 1.5rem;
}

.quiz-question {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  font-weight: 700;
  margin-bottom: 1.2rem;
  line-height: 1.4;
  color: var(--deep);
}

.quiz-note {
  font-size: 0.85rem;
  color: var(--warm-gray);
  font-style: italic;
  margin-top: -0.8rem;
  margin-bottom: 1rem;
  line-height: 1.4;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.option-btn {
  font-family: 'Lora', serif;
  font-size: 1rem;
  padding: 0.9rem 1.2rem;
  border: 2px solid var(--gold-light);
  border-radius: 14px;
  background: white;
  color: var(--deep);
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  line-height: 1.3;
}

.option-btn:hover:not(.disabled) {
  border-color: var(--gold);
  background: linear-gradient(135deg, rgba(212,168,83,0.08), rgba(196,114,127,0.08));
  transform: translateX(6px);
}

.option-btn.correct {
  border-color: var(--sage);
  background: rgba(139, 168, 136, 0.15);
  color: #2d5a27;
}

.option-btn.wrong {
  border-color: var(--rose);
  background: rgba(196, 114, 127, 0.1);
  color: var(--rose);
  opacity: 0.7;
}

.option-btn.disabled { cursor: default; }

.feedback {
  margin-top: 1rem;
  padding: 1rem;
  border-radius: 12px;
  font-size: 0.95rem;
  line-height: 1.5;
  animation: fadeIn 0.4s ease;
  display: none;
}

.feedback.show { display: block; }

.feedback.correct-fb {
  background: rgba(139, 168, 136, 0.12);
  border-left: 4px solid var(--sage);
}

.feedback.wrong-fb {
  background: rgba(196, 114, 127, 0.08);
  border-left: 4px solid var(--rose);
}

.btn-next {
  margin-top: 1.2rem;
  background: var(--deep);
  color: var(--cream);
  font-size: 1rem;
  padding: 0.8rem 2.5rem;
  display: none;
}

.btn-next.show { display: inline-block; }
.btn-next:hover { background: var(--warm-gray); }

/* END SCREEN */
.end-screen {
  background: linear-gradient(135deg, var(--cream) 0%, var(--gold-light) 40%, var(--rose-light) 100%);
  text-align: center;
  padding: 2rem;
}

.end-screen h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  margin-bottom: 1rem;
}

.score-display {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--rose));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 1rem 0;
}

.end-message {
  font-size: 1.2rem;
  color: var(--warm-gray);
  max-width: 500px;
  line-height: 1.6;
  margin-bottom: 2rem;
}

.btn-restart {
  background: var(--deep);
  color: var(--cream);
}

.btn-restart:hover { background: var(--warm-gray); }

.flower { font-size: 2rem; margin: 0 0.3rem; }

@media (max-width: 500px) {
  .quiz-content { padding: 1.2rem; }
  .option-btn { font-size: 0.9rem; padding: 0.75rem 1rem; }
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="screen start-screen active" id="startScreen">
  <div>
    <span class="flower">🌸</span><span class="flower">🌷</span><span class="flower">🌺</span>
  </div>
  <h1>Omas Geburtstags&shy;quiz</h1>
  <div class="age">91</div>
  <p class="subtitle">6. April 2026 – Eine Reise durch Erinnerungen</p>
  <button class="btn btn-start" onclick="startQuiz()">Los geht's!</button>
</div>

<!-- QUIZ SCREEN -->
<div class="screen quiz-screen" id="quizScreen">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="question-counter" id="questionCounter"></div>
  <div class="quiz-card" id="quizCard">
    <div class="quiz-image-container">
      <img id="quizImage" src="" alt="Quiz-Bild">
    </div>
    <div class="quiz-content">
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-note" id="quizNote" style="display:none;"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-next" id="btnNext" onclick="nextQuestion()">Weiter →</button>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen end-screen" id="endScreen">
  <div>
    <span class="flower">🎂</span><span class="flower">🥂</span><span class="flower">🎉</span>
  </div>
  <h1>Bravo, Oma!</h1>
  <div class="score-display" id="scoreDisplay"></div>
  <p class="end-message" id="endMessage"></p>
  <button class="btn btn-restart" onclick="restartQuiz()">Nochmal spielen</button>
</div>

<div class="confetti-container" id="confettiContainer"></div>

let currentQuestion = 0;
let score = 0;

function startQuiz() {
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  const card = document.getElementById('quizCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'cardIn 0.5s ease';

  document.getElementById('questionCounter').textContent = 'FRAGE ' + (currentQuestion + 1) + ' VON ' + questions.length;
  document.getElementById('progressFill').style.width = ((currentQuestion) / questions.length * 100) + '%';
  document.getElementById('quizImage').src = IMAGES[q.image];
  document.getElementById('quizImage').style.objectPosition = q.imgPos || 'center';
  document.getElementById('quizQuestion').textContent = q.question;
  
  const noteEl = document.getElementById('quizNote');
  if (q.note) { noteEl.textContent = q.note; noteEl.style.display = 'block'; }
  else { noteEl.style.display = 'none'; }

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = String.fromCharCode(65 + i) + ')  ' + opt;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btnNext').classList.remove('show');
}

function selectAnswer(idx) {
  const q = questions[currentQuestion];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => { b.classList.add('disabled'); b.onclick = null; });

  const feedback = document.getElementById('feedback');
  
  if (idx === q.correct) {
    buttons[idx].classList.add('correct');
    feedback.className = 'feedback correct-fb show';
    feedback.textContent = '✅ ' + q.feedback_correct;
    score++;
  } else {
    buttons[idx].classList.add('wrong');
    buttons[q.correct].classList.add('correct');
    feedback.className = 'feedback wrong-fb show';
    feedback.textContent = '💫 ' + q.feedback_wrong;
  }

  document.getElementById('btnNext').classList.add('show');
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    showEnd();
  }
}

function showEnd() {
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('endScreen').classList.add('active');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('scoreDisplay').textContent = score + ' / ' + questions.length;

  let msg = '';
  if (score >= 8) msg = 'Unglaublich! Oma, du kennst dein eigenes Leben besser als jeder Historiker. 91 Jahre voller Erinnerungen – und du hast keine einzige vergessen!';
  else if (score >= 5) msg = 'Sehr gut! Ein paar Details sind vielleicht etwas verblasst – aber die wichtigsten Erinnerungen sitzen. Auf die nächsten 91! 🥂';
  else msg = 'Naja, Oma... vielleicht war der Kuchen wichtiger als die Details? Egal – Hauptsache, du bist da und wir feiern dich! 🎉';

  document.getElementById('endMessage').textContent = msg;
  launchConfetti();
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#D4A853', '#C4727F', '#8BA888', '#F0DBA8', '#F2D1D5', '#E8976D'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 8 + 5) + 'px';
    el.style.height = (Math.random() * 8 + 5) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (Math.random() * 2 + 2) + 's';
    el.style.animationDelay = (Math.random() * 3) + 's';
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; }, 6000);
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;
  document.getElementById('endScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  showQuestion();
}
</script>
</body>
</html>
